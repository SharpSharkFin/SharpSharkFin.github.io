<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
    }

    #noBtn {
      position: absolute;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Do you like me?</h1>

  <button onclick="goYes()">Yes</button>
  <button id="noBtn" onclick="moveNo()">No</button>

  <script>
    let count = 0;

    function goYes() {
      window.location.href = "yes.html";
    }

    function moveNo() {
      count++;

      if (count < 4) {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 50);

        let btn = document.getElementById("noBtn");
        btn.style.left = x + "px";
        btn.style.top = y + "px";
      } else {
        window.location.href = "no.html";
      }
    }
  </script>

</body>
</html>
