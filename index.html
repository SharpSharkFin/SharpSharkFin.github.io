<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ MOST IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Message Request</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #01060c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 10px; /* ✅ prevents edge touching on phones */
  }

  .chat-box {
    width: 100%;
    max-width: 360px; /* ✅ responsive instead of fixed */
    background: rgb(24, 24, 24);
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: rgb(15, 15, 15);
    color: white;
    text-align: center;
    padding: 15px;
  }

  .profile-big {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    margin: 0 auto 10px;
    background-image: url(cateli.jpg);
    background-size: cover;
    background-position: center;
    border: 3px solid white;
  }

  .name {
    font-weight: bold;
    font-size: 4vw; /* ✅ scales on mobile */
  }

  /* CHAT AREA */
  .chat-area {
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .profile-small {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background-image: url(cateli.jpg);
    background-size: cover;
    background-position: center;
  }

  .msg {
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 75%;
    font-size: 14px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideIn 0.5s forwards;
    word-wrap: break-word; /* ✅ prevents overflow */
  }

  .left {
    background: #e4e6eb;
  }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* BUTTONS */
  .buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    flex-wrap: wrap; /* ✅ prevents squishing */
  }

  button {
    padding: 12px 20px; /* ✅ bigger for fingers */
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
    border-radius: 8px;
  }

  #acceptBtn {
    background: #1877f2;
    color: white;
  }

  #acceptBtn:hover {
    background: #0f5bd6;
  }

  #rejectBtn {
    background: #e63946;
    color: white;
    position: relative;
  }

</style>
</head>

<body>

<div class="chat-box">

  <!-- HEADER -->
  <div class="header">
    <div class="profile-big"></div>
    <div class="name">Eli PA (Message Request)</div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">

    <div class="msg-row">
      <div class="profile-small"></div>
      <div class="msg left" style="animation-delay: 1s;">Hi po</div>
    </div>

    <div class="msg-row">
      <div class="profile-small"></div>
      <div class="msg left" style="animation-delay: 2.5s;">single po ba kau?</div>
    </div>

    <div class="msg-row">
      <div class="profile-small"></div>
      <div class="msg left" style="animation-delay: 4s;">pwede poba manligaw HAAAHAHHA</div>
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <button id="acceptBtn" onclick="goYes()">Accept</button>
    <button id="rejectBtn" onclick="moveNo()">Reject</button>
  </div>

</div>

<script>
let count = 0;

function goYes() {
  window.location.href = "No.html";
}

function moveNo() {
  count++;

  let btn = document.getElementById("rejectBtn");

  if (count < 4) {
    let maxX = 100;
    let maxY = 50;

    let x = Math.random() * maxX - maxX / 2;
    let y = Math.random() * maxY - maxY / 2;

    btn.style.transform = `translate(${x}px, ${y}px)`;
  } else {
    window.location.href = "No.html";
  }
}
</script>

</body>
</html>
